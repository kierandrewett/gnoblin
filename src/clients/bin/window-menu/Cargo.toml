[package]
name = "gnoblin-window-menu"
version = "0.1.0"
edition = "2021"
description = "gnoblin window menu — an on-demand Slint wlr-layer-shell popup spawned by the compositor for a window"

[[bin]]
name = "gnoblin-window-menu"
path = "src/main.rs"

[dependencies]
gnoblin-core = { path = "../../crates/gnoblin-core" }
gnoblin-runtime = { path = "../../crates/gnoblin-runtime" }
slint = { version = "1.16", default-features = false, features = ["compat-1-2", "std", "renderer-femtovg"] }
smithay-client-toolkit = "0.19"

[build-dependencies]
slint-build = "1.16"
