# gnoblin shipped defaults — parsed as a BASE layer underneath the user's
# ~/.config/gnoblin/gnoblin.conf (user keys win; the user can override a plugin
# by re-declaring its [qs-plugin.NAME], disable one with `enabled = off`, add new
# ones, or reorder them all with `[quicksettings] order = ...`).
#
# The quick-settings tiles are NOT hardcoded in the shell: each is a
# process/command plugin (prefixed `gnoblin-qs-`) that polls asynchronously and
# emits the tile + optional slide-out submenu over the qs-plugin protocol. This
# is the dogfooded default set, in display order.

# Compositor-managed visual effects. The RING border palette lives HERE, not in
# the C — a two-layer Tailwind-style edge (inner `border` + outer `ring`),
# rendered INSIDE the rounded corner so it never grows the window or occludes
# content. Focus-aware (focused variants) and theme-aware (dark/light). The
# compositor applies it to SSD, CSD and layer-shell surfaces. Override any key
# (including `border-style = none`) from your own gnoblin.conf.
[effects]
# Corner rounding is compositor-managed (config-controlled, like blur) rather
# than drawn in the Slint UI — so SSD/CSD app windows round too. Radius in px.
rounding = 12
border-style = ring
# Band widths (logical px), both drawn inside the edge.
ring-border-width = 1
ring-width = 1
# Dark theme: a faint white inner border + a dark outer ring; both strengthen
# when the window is focused. (#rrggbbaa — alpha is the last byte.)
ring-border-color-dark         = "#ffffff14"
ring-border-color-focused-dark = "#ffffff29"
ring-color-dark                = "#000000e0"
ring-color-focused-dark        = "#000000f5"
# Light theme: a subtle GRAY outer edge + a near-invisible pure-WHITE inner
# highlight just inside it (the shadcn/Lovable input look — outer reads as a thin
# light-gray hairline, inner lifts the very edge). Both strengthen a touch on
# focus. `ring-border-*` is the OUTER band (at the edge); `ring-*` is the inner.
ring-border-color-light         = "#0000001a"
ring-border-color-focused-light = "#00000026"
ring-color-light                = "#ffffffff"
ring-color-focused-light        = "#ffffffff"

[quicksettings]
order = wifi, bluetooth, output, mic, nightlight, dnd, darkstyle, powermode, backgroundapps

[qs-plugin.wifi]
command = gnoblin-qs-wifi
mode = oneshot
interval = 4s

[qs-plugin.bluetooth]
command = gnoblin-qs-bluetooth
mode = oneshot
interval = 5s

[qs-plugin.output]
command = gnoblin-qs-output
mode = oneshot
interval = 2s

[qs-plugin.mic]
command = gnoblin-qs-mic
mode = oneshot
interval = 2s

[qs-plugin.nightlight]
command = gnoblin-qs-nightlight
mode = oneshot
interval = 10s

[qs-plugin.dnd]
command = gnoblin-qs-dnd
mode = oneshot
interval = 10s

[qs-plugin.darkstyle]
command = gnoblin-qs-darkstyle
mode = oneshot
interval = 10s

[qs-plugin.powermode]
command = gnoblin-qs-powermode
mode = oneshot
interval = 10s

[qs-plugin.backgroundapps]
command = gnoblin-qs-backgroundapps
mode = oneshot
interval = 10s
